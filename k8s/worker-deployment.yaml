apiVersion: apps/v1
kind: Deployment
metadata:
  name: maritime-worker
  namespace: maritime-studio
  labels:
    app: maritime-studio
    component: worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: maritime-studio
      component: worker
  template:
    metadata:
      labels:
        app: maritime-studio
        component: worker
    spec:
      containers:
      - name: worker
        image: maritime-studio/worker:latest
        imagePullPolicy: Always
        
        env:
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: maritime-studio-config
              key: ENVIRONMENT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: maritime-studio-config
              key: LOG_LEVEL
        - name: BLENDER_RENDER_BACKEND
          valueFrom:
            configMapKeyRef:
              name: maritime-studio-config
              key: BLENDER_RENDER_BACKEND
        - name: BLENDER_SAMPLES
          valueFrom:
            configMapKeyRef:
              name: maritime-studio-config
              key: BLENDER_SAMPLES
        
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: maritime-studio-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: maritime-studio-secrets
              key: REDIS_URL
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: maritime-studio-secrets
              key: OPENAI_API_KEY
        - name: MINIO_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: maritime-studio-secrets
              key: MINIO_ENDPOINT
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: maritime-studio-secrets
              key: MINIO_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: maritime-studio-secrets
              key: MINIO_SECRET_KEY
        
        resources:
          requests:
            cpu: 2000m
            memory: 2Gi
          limits:
            cpu: 4000m
            memory: 4Gi
        
        volumeMounts:
        - name: render-cache
          mountPath: /render_output
        - name: logs
          mountPath: /logs
      
      volumes:
      - name: render-cache
        emptyDir: {}
      - name: logs
        emptyDir: {}
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - maritime-studio
              topologyKey: kubernetes.io/hostname
