apiVersion: v1
kind: Secret
metadata:
  name: maritime-studio-secrets
  namespace: maritime-studio
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql://maritime_user:password@postgres:5432/maritime_studio"
  
  # Redis
  REDIS_URL: "redis://redis:6379/0"
  
  # Storage
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_BUCKET: "maritime-studio"
  
  # OpenAI
  OPENAI_API_KEY: "sk-CHANGE_ME_WITH_REAL_KEY"
  
  # JWT
  JWT_SECRET_KEY: "CHANGE_ME_WITH_STRONG_RANDOM_STRING"
  
  # Notifications (optional)
  WEBHOOK_URL: ""
  SLACK_WEBHOOK_URL: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: maritime-studio-config
  namespace: maritime-studio
data:
  ENVIRONMENT: "production"
  API_PORT: "8000"
  BLENDER_RENDER_BACKEND: "CPU"
  BLENDER_SAMPLES: "128"
  BLENDER_RESOLUTION_WIDTH: "1920"
  BLENDER_RESOLUTION_HEIGHT: "1080"
  LOG_LEVEL: "INFO"
  DEFAULT_COST_THRESHOLD: "100.0"
